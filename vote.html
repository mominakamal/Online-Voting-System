<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vote - Online Voting Application</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <span class="logo">Online Voting</span>
        <nav>
            <a href="index.html">Home</a>
            <a href="register.html">Register</a>
            <a href="login.html">Login</a>
            <a href="vote.html">Vote</a>
            <a href="login.html">Logout</a>
        </nav>
    </div>
    <div class="sidebar">
        <a href="index.html">Home</a>
        <a href="register.html">Register</a>
        <a href="login.html">Login</a>
        <a href="vote.html">Vote</a>
        <a href="login.html">Logout</a>
    </div>
    <div class="container">
        <h2>Welcome, Voter!</h2>
        <p>Please select your preferred candidate and submit your vote.</p>
        <form action="confirm.html">
            <div class="candidates">
                <label class="candidate-card">
                    <input type="radio" name="candidate" required>
                    <span class="candidate-photo">A</span>
                    <span class="candidate-info">
                        <span class="candidate-name">Alice Johnson</span><br>
                        <span class="candidate-party">Party: Unity Party</span>
                    </span>
                </label>
                <label class="candidate-card">
                    <input type="radio" name="candidate">
                    <span class="candidate-photo">B</span>
                    <span class="candidate-info">
                        <span class="candidate-name">Bob Smith</span><br>
                        <span class="candidate-party">Party: Progress Party</span>
                    </span>
                </label>
                <label class="candidate-card">
                    <input type="radio" name="candidate">
                    <span class="candidate-photo">C</span>
                    <span class="candidate-info">
                        <span class="candidate-name">Charlie Lee</span><br>
                        <span class="candidate-party">Party: Future Party</span>
                    </span>
                </label>
            </div>
            <input type="submit" value="Submit Vote">
        </form>
    </div>
    <div class="footer">
        &copy; 2025 Online Voting Application &mdash; Contact: info@votingapp.com
    </div>
</body>
</html>
